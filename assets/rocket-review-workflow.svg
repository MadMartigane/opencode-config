<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #64748b; }
      .node-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #1e293b; }
      .node-sub { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #64748b; }
      .badge { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #ffffff; }
      .focus-item { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: #475569; }
      .note { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; font-style: italic; }
      .arrow { stroke: #cbd5e1; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-bold { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-bold); }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
    </marker>
    <marker id="arrowhead-bold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>

    <linearGradient id="grad-diff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="grad-router" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="grad-audit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="grad-critic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="grad-report" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="360" fill="#ffffff" rx="12" />

  <!-- Title -->
  <text x="500" y="38" class="title" text-anchor="middle">Rocket-Review Workflow</text>
  <text x="500" y="58" class="subtitle" text-anchor="middle">Specialized audit pipeline for code review</text>

  <!-- Node 1: Diff / PR Changes -->
  <rect x="40" y="100" width="140" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
  <rect x="40" y="100" width="6" height="80" rx="3" fill="url(#grad-diff)" />
  <text x="60" y="130" class="node-title">Diff / PR</text>
  <text x="60" y="150" class="node-sub">Changes</text>

  <!-- Arrow 1 → 2 -->
  <path d="M 180 140 L 230 140" class="arrow-bold" />
  <text x="205" y="130" class="badge" fill="#94a3b8" text-anchor="middle">selective</text>

  <!-- Node 2: Router-review -->
  <rect x="230" y="100" width="140" height="80" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2" />
  <rect x="230" y="100" width="6" height="80" rx="3" fill="url(#grad-router)" />
  <text x="250" y="130" class="node-title">Router-review</text>
  <text x="250" y="150" class="node-sub">Selects focuses</text>

  <!-- Badge: Selective routing -->
  <rect x="230" y="185" width="90" height="20" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1" />
  <text x="275" y="198" class="badge" fill="#7c3aed" text-anchor="middle" font-size="9">Selective routing</text>

  <!-- Arrow 2 → 3 -->
  <path d="M 370 140 L 420 140" class="arrow-bold" />
  <text x="395" y="130" class="badge" fill="#94a3b8" text-anchor="middle">parallel</text>

  <!-- Node 3: Parallel Code-Audit Specialists -->
  <rect x="420" y="90" width="200" height="170" rx="10" fill="#f0f9ff" stroke="#06b6d4" stroke-width="2" />
  <rect x="420" y="90" width="6" height="170" rx="3" fill="url(#grad-audit)" />
  <text x="440" y="115" class="node-title">Parallel Code-Audit</text>
  <text x="440" y="132" class="node-sub">Specialists</text>

  <!-- Focus items inside Node 3 -->
  <rect x="435" y="145" width="170" height="18" rx="4" fill="#ffffff" stroke="#e0f2fe" stroke-width="1" />
  <text x="445" y="157" class="focus-item">Security</text>

  <rect x="435" y="167" width="170" height="18" rx="4" fill="#ffffff" stroke="#e0f2fe" stroke-width="1" />
  <text x="445" y="179" class="focus-item">Error &amp; Resilience</text>

  <rect x="435" y="189" width="170" height="18" rx="4" fill="#ffffff" stroke="#e0f2fe" stroke-width="1" />
  <text x="445" y="201" class="focus-item">Logic &amp; Business Rules</text>

  <rect x="435" y="211" width="170" height="18" rx="4" fill="#ffffff" stroke="#e0f2fe" stroke-width="1" />
  <text x="445" y="223" class="focus-item">Performance &amp; Scalability</text>

  <rect x="435" y="233" width="170" height="18" rx="4" fill="#ffffff" stroke="#e0f2fe" stroke-width="1" />
  <text x="445" y="245" class="focus-item">Architecture &amp; Maintainability</text>

  <rect x="435" y="255" width="170" height="18" rx="4" fill="#ffffff" stroke="#e0f2fe" stroke-width="1" />
  <text x="445" y="267" class="focus-item">Readability &amp; Idiomatic</text>

  <!-- Badge: Parallel -->
  <rect x="530" y="265" width="60" height="20" rx="10" fill="#cffafe" stroke="#67e8f9" stroke-width="1" />
  <text x="560" y="278" class="badge" fill="#0891b2" text-anchor="middle" font-size="9">Parallel</text>

  <!-- Arrow 3 → 4 -->
  <path d="M 620 175 L 670 175" class="arrow-bold" />

  <!-- Node 4: Critic-review -->
  <rect x="670" y="135" width="160" height="80" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
  <rect x="670" y="135" width="6" height="80" rx="3" fill="url(#grad-critic)" />
  <text x="690" y="165" class="node-title">Critic-review</text>
  <text x="690" y="185" class="node-sub">Filters &amp; consolidates</text>

  <!-- Filter label near Critic-review -->
  <rect x="670" y="220" width="160" height="28" rx="6" fill="#ffedd5" stroke="#fdba74" stroke-width="1" />
  <text x="750" y="231" class="node-sub" text-anchor="middle" font-weight="600" font-size="9">Deduplicate • Challenge</text>
  <text x="750" y="243" class="node-sub" text-anchor="middle" font-weight="600" font-size="9">Reject weak findings</text>

  <!-- Badge: False-positive filter -->
  <rect x="690" y="253" width="120" height="20" rx="10" fill="#ffedd5" stroke="#fdba74" stroke-width="1" />
  <text x="750" y="266" class="badge" fill="#ea580c" text-anchor="middle" font-size="9">False-positive filter</text>

  <!-- Arrow 4 → 5 -->
  <path d="M 830 175 L 880 175" class="arrow-bold" />

  <!-- Node 5: Final Report / Rocket Brief -->
  <rect x="880" y="135" width="100" height="80" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" />
  <rect x="880" y="135" width="6" height="80" rx="3" fill="url(#grad-report)" />
  <text x="900" y="165" class="node-title" font-size="12">Final Report</text>
  <text x="900" y="185" class="node-sub">Rocket Brief</text>

  <!-- Optional Node 6: Hand off to Rocket (downstream, visually secondary) -->
  <rect x="880" y="245" width="100" height="50" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="930" y="267" class="node-sub" text-anchor="middle" font-size="11">Hand off to</text>
  <text x="930" y="283" class="node-sub" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Rocket</text>
  <text x="930" y="300" class="note" text-anchor="middle">(optional)</text>

  <!-- Arrow 5 → 6 (optional path) -->
  <path d="M 930 215 L 930 240" class="arrow" stroke-dasharray="4,3" />

</svg>
