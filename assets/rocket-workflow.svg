<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; rx: 8; }
      .box-primary { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .box-sub { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 8; }
      .box-check { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; rx: 8; }
      .box-sync { fill: #fcf8e3; stroke: #ffc107; stroke-width: 2; stroke-dasharray: 5,5; rx: 8; }
      .text { font-family: sans-serif; font-size: 14px; fill: #212529; text-anchor: middle; dominant-baseline: middle; }
      .text-bold { font-weight: bold; }
      .text-small { font-size: 12px; fill: #6c757d; }
      .arrow { stroke: #495057; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #495057; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .arrow-fail { stroke: #d32f2f; stroke-width: 2; fill: none; marker-end: url(#arrowhead-fail); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
    <marker id="arrowhead-fail" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d32f2f" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Sync Phase Box -->
  <rect x="30" y="20" width="480" height="110" class="box-sync" />
  <text x="270" y="40" class="text text-small text-bold" fill="#856404">🤝 Phase 1: Initialization &amp; Synchronization</text>

  <!-- Nodes -->
  <rect x="50" y="60" width="120" height="50" class="box" />
  <text x="110" y="85" class="text text-bold">User</text>

  <rect x="350" y="60" width="140" height="50" class="box-primary" />
  <text x="420" y="80" class="text text-bold">Rocket</text>
  <text x="420" y="95" class="text text-small">(Primary Agent)</text>

  <!-- Sync Arrows -->
  <path d="M 170 70 L 340 70" class="arrow" />
  <text x="255" y="60" class="text text-small">1. Request &amp; Clarify</text>

  <path d="M 340 100 L 170 100" class="arrow" />
  <text x="255" y="115" class="text text-small">2. Propose Plan</text>

  <!-- Loop Box -->
  <rect x="230" y="190" width="340" height="180" fill="#fafafa" stroke="#dee2e6" stroke-width="2" stroke-dasharray="5,5" rx="8" />
  <text x="400" y="210" class="text text-small text-bold">⚙️ Phase 2: Per-Task Execution Loop</text>

  <rect x="250" y="230" width="140" height="50" class="box-sub" />
  <text x="320" y="250" class="text text-bold">Code-Only</text>
  <text x="320" y="265" class="text text-small">(Implementation)</text>

  <rect x="450" y="230" width="100" height="50" class="box-check" />
  <text x="500" y="250" class="text text-bold">Code-Smoke</text>
  <text x="500" y="265" class="text text-small">(Validation)</text>

  <rect x="250" y="410" width="140" height="50" class="box-sub" />
  <text x="320" y="430" class="text text-bold">Code-Cleaner</text>
  <text x="320" y="445" class="text text-small">(QA &amp; Refine)</text>

  <rect x="450" y="410" width="120" height="50" class="box-sub" />
  <text x="510" y="430" class="text text-bold">Git-Expert</text>
  <text x="510" y="445" class="text text-small">(Commit)</text>

  <rect x="650" y="410" width="100" height="50" class="box" />
  <text x="700" y="435" class="text text-bold">Done</text>

  <!-- Edges -->
  <path d="M 420 110 L 420 220" class="arrow" />
  <text x="420" y="165" class="text text-small">3. Plan Approved (Start Tasks)</text>
  
  <path d="M 390 255 L 440 255" class="arrow" />
  
  <!-- Fail loop -->
  <path d="M 500 280 C 500 330, 320 330, 320 290" class="arrow-fail" />
  <text x="410" y="325" class="text text-small" fill="#d32f2f">Fail (Fix)</text>

  <!-- Success loop -->
  <path d="M 500 230 C 500 180, 320 180, 320 220" class="arrow-dashed" />
  <text x="410" y="195" class="text text-small">Pass (Next Task)</text>

  <!-- After loop -->
  <path d="M 320 370 L 320 400" class="arrow" />
  <text x="320" y="385" class="text text-small">All tasks pass</text>

  <path d="M 390 435 L 440 435" class="arrow" />
  <path d="M 570 435 L 640 435" class="arrow" />

</svg>