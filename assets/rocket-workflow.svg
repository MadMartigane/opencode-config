<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #343a40; stroke-width: 2; rx: 8; }
      .box-primary { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .box-sub { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 8; }
      .box-check { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; rx: 8; }
      .text { font-family: sans-serif; font-size: 14px; fill: #212529; text-anchor: middle; dominant-baseline: middle; }
      .text-bold { font-weight: bold; }
      .text-small { font-size: 12px; fill: #6c757d; }
      .arrow { stroke: #495057; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #495057; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }
      .arrow-fail { stroke: #d32f2f; stroke-width: 2; fill: none; marker-end: url(#arrowhead-fail); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
    <marker id="arrowhead-fail" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d32f2f" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Nodes -->
  <rect x="50" y="50" width="120" height="50" class="box" />
  <text x="110" y="75" class="text text-bold">User Request</text>

  <rect x="250" y="50" width="140" height="50" class="box-primary" />
  <text x="320" y="70" class="text text-bold">Rocket</text>
  <text x="320" y="85" class="text text-small">(Primary Agent)</text>

  <!-- Loop Box -->
  <rect x="230" y="140" width="340" height="180" fill="#fafafa" stroke="#dee2e6" stroke-width="2" stroke-dasharray="5,5" rx="8" />
  <text x="400" y="160" class="text text-small text-bold">Per-Task Loop</text>

  <rect x="250" y="180" width="140" height="50" class="box-sub" />
  <text x="320" y="200" class="text text-bold">Code-Only</text>
  <text x="320" y="215" class="text text-small">(Implementation)</text>

  <rect x="450" y="180" width="100" height="50" class="box-check" />
  <text x="500" y="200" class="text text-bold">Code-Smoke</text>
  <text x="500" y="215" class="text text-small">(Validation)</text>

  <rect x="250" y="360" width="140" height="50" class="box-sub" />
  <text x="320" y="380" class="text text-bold">Code-Cleaner</text>
  <text x="320" y="395" class="text text-small">(QA &amp; Refine)</text>

  <rect x="450" y="360" width="120" height="50" class="box-sub" />
  <text x="510" y="380" class="text text-bold">Git-Expert</text>
  <text x="510" y="395" class="text text-small">(Commit)</text>

  <rect x="650" y="360" width="100" height="50" class="box" />
  <text x="700" y="385" class="text text-bold">Done</text>

  <!-- Edges -->
  <path d="M 170 75 L 240 75" class="arrow" />
  <path d="M 320 100 L 320 170" class="arrow" />
  
  <path d="M 390 205 L 440 205" class="arrow" />
  
  <!-- Fail loop -->
  <path d="M 500 230 C 500 280, 320 280, 320 240" class="arrow-fail" />
  <text x="410" y="275" class="text text-small" fill="#d32f2f">Fail (Fix)</text>

  <!-- Success loop -->
  <path d="M 500 180 C 500 130, 320 130, 320 170" class="arrow-dashed" />
  <text x="410" y="145" class="text text-small">Pass (Next Task)</text>

  <!-- After loop -->
  <path d="M 320 320 L 320 350" class="arrow" />
  <text x="320" y="335" class="text text-small">All tasks pass</text>

  <path d="M 390 385 L 440 385" class="arrow" />
  <path d="M 570 385 L 640 385" class="arrow" />

</svg>