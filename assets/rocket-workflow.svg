<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; fill: #64748b; }
      .badge-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #ffffff; text-anchor: middle; dominant-baseline: central; letter-spacing: 0.3px; }
      .step-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: 700; dominant-baseline: central; fill: #1e293b; }
      .step-sub { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #64748b; dominant-baseline: central; }
      .card-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 700; dominant-baseline: central; }
      .card-note { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; fill: #64748b; dominant-baseline: central; }
      .legend-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #334155; dominant-baseline: central; }
      .arrow { stroke: #cbd5e1; stroke-width: 2; fill: none; marker-end: url(#arrow-default); }
      .arrow-main { stroke: #3b82f6; stroke-width: 3; fill: none; marker-end: url(#arrow-main); }
      .arrow-branch { stroke: #f59e0b; stroke-width: 2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrow-branch); }
    </style>

    <marker id="arrow-default" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cbd5e1" />
    </marker>
    <marker id="arrow-main" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
    <marker id="arrow-branch" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b" />
    </marker>

    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="1100" fill="#ffffff" rx="12" />

  <text x="450" y="38" class="title" text-anchor="middle">Rocket Workflow</text>
  <text x="450" y="58" class="subtitle" text-anchor="middle">User-facing command flow with built-in quality gates</text>

  <!-- Legend: Prompt vs Commands -->
  <rect x="40" y="80" width="820" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="60" y="105" class="legend-text" font-weight="700">Legend:</text>
  <rect x="130" y="92" width="16" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="154" y="105" class="legend-text">Prompt = persona / guardrails</text>
  <rect x="340" y="92" width="16" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="364" y="105" class="legend-text">Commands = workflow steps</text>
  <text x="570" y="105" class="legend-text" font-weight="600" fill="#059669">Quality: 3 user gates | max 3 retries | final validation required</text>

  <!-- Step 1: User Request -->
  <rect x="275" y="150" width="350" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="450" y="172" class="step-title" text-anchor="middle">1. User Request</text>
  <text x="450" y="192" class="step-sub" text-anchor="middle">Natural language task description</text>

  <path d="M 450 210 L 450 240" class="arrow-main" />

  <!-- Step 2: Exploration -->
  <rect x="275" y="240" width="350" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
  <text x="450" y="262" class="step-title" text-anchor="middle">2. Exploration (automatic)</text>
  <text x="450" y="282" class="step-sub" text-anchor="middle">Context scan via explore agent</text>

  <path d="M 450 300 L 450 330" class="arrow-main" />

  <!-- Step 3: /clarify -->
  <rect x="275" y="330" width="350" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
  <text x="450" y="352" class="step-title" text-anchor="middle">3. /clarify</text>
  <text x="450" y="372" class="step-sub" text-anchor="middle">Scope refinement &amp; criteria definition</text>

  <path d="M 450 390 L 450 420" class="arrow-main" />

  <!-- Step 4: Planning Decision -->
  <rect x="275" y="420" width="350" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
  <text x="450" y="442" class="step-title" text-anchor="middle">4. Planning Decision</text>
  <text x="450" y="462" class="step-sub" text-anchor="middle">Choose planning approach</text>
  <text x="450" y="478" class="card-note" text-anchor="middle" font-weight="600" fill="#1d4ed8">Main path: /plan</text>

  <!-- Branch to /plan-thinker -->
  <path d="M 625 455 C 700 455, 700 420, 750 420" class="arrow-branch" />
  <rect x="750" y="390" width="130" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" />
  <text x="815" y="412" class="card-title" text-anchor="middle" fill="#b45309">/plan-thinker</text>
  <text x="815" y="428" class="card-note" text-anchor="middle">Multiple reasoning paths</text>
  <text x="815" y="442" class="card-note" text-anchor="middle">+ confidence score</text>

  <!-- Main path continues to /plan -->
  <path d="M 450 490 L 450 520" class="arrow-main" />

  <!-- /plan box (part of step 4 visually) -->
  <rect x="320" y="520" width="260" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
  <text x="450" y="542" class="card-title" text-anchor="middle" font-size="14px" fill="#1d4ed8">/plan</text>
  <text x="450" y="558" class="card-note" text-anchor="middle">Structured execution plan</text>

  <path d="M 450 570 L 450 600" class="arrow-main" />

  <!-- Step 5: User Validates Plan -->
  <rect x="275" y="600" width="350" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="450" y="622" class="step-title" text-anchor="middle">5. User Validates Plan</text>
  <text x="450" y="642" class="step-sub" text-anchor="middle">Explicit approval required</text>

  <path d="M 450 660 L 450 690" class="arrow-main" />

  <!-- Step 6: /execute -->
  <rect x="275" y="690" width="350" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
  <text x="450" y="712" class="step-title" text-anchor="middle">6. /execute</text>
  <text x="450" y="732" class="step-sub" text-anchor="middle">Trigger implementation phase</text>

  <path d="M 450 750 L 450 780" class="arrow-main" />

  <!-- Step 7: code-only + code-smoke -->
  <rect x="275" y="780" width="350" height="90" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="2" />
  <text x="450" y="802" class="step-title" text-anchor="middle">7. Execution</text>
  <rect x="295" y="814" width="310" height="24" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1" />
  <text x="450" y="830" class="card-note" text-anchor="middle" font-weight="600" fill="#059669">All edits via code-only</text>
  <rect x="295" y="844" width="310" height="24" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="1" />
  <text x="450" y="860" class="card-note" text-anchor="middle" font-weight="600" fill="#059669">Validation via code-smoke (scoped checks)</text>

  <path d="M 450 870 L 450 900" class="arrow-main" />

  <!-- Step 8: Final Validation -->
  <rect x="275" y="900" width="350" height="60" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2" />
  <text x="450" y="922" class="step-title" text-anchor="middle">8. Final Validation</text>
  <text x="450" y="942" class="step-sub" text-anchor="middle">Global QA check (mandatory)</text>

  <path d="M 450 960 L 450 990" class="arrow-main" />

  <!-- Step 9: Closure -->
  <rect x="275" y="990" width="350" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" />
  <text x="450" y="1012" class="step-title" text-anchor="middle">9. Closure</text>
  <text x="450" y="1032" class="step-sub" text-anchor="middle">Final report; local changes ready</text>
</svg>
